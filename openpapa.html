<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPapa - 您的語音美食助手</title>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --accent-red: #ff4444;
            --accent-orange: #ff6b35;
            --accent-green: #10b981;
            --accent-yellow: #ffc107;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --border-color: #2a2a3a;
            --gradient-red: linear-gradient(135deg, #ff4444, #ff6b35);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(255, 68, 68, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 107, 53, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 1rem 0 1.5rem;
        }
        
        header h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        header p {
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
        
        .voice-main {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 2rem;
            padding: 2.5rem 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .voice-main:hover {
            border-color: var(--accent-red);
            transform: translateY(-2px);
        }
        
        .voice-main.listening {
            border-color: var(--accent-green);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
        }
        
        .voice-main.speaking {
            border-color: var(--accent-orange);
            box-shadow: 0 0 40px rgba(255, 107, 53, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 107, 53, 0.3); }
            50% { box-shadow: 0 0 60px rgba(255, 107, 53, 0.5); }
        }
        
        .papa-emoji {
            font-size: 4.5rem;
            display: block;
            margin-bottom: 1rem;
            transition: transform 0.3s;
        }
        
        .voice-main.listening .papa-emoji {
            animation: bounce 0.6s infinite;
        }
        
        .voice-main.speaking .papa-emoji {
            animation: speak 0.8s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes speak {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .voice-status {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-red);
            margin-bottom: 0.5rem;
        }
        
        .voice-main.listening .voice-status {
            color: var(--accent-green);
        }
        
        .voice-hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .recording-indicator {
            display: none;
            color: var(--accent-green);
            font-size: 0.8rem;
            margin-top: 5px;
        }
        
        .voice-main.listening .recording-indicator {
            display: block;
        }
        
        .wave-container {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 40px;
            margin-top: 1rem;
        }
        
        .voice-main.listening .wave-container,
        .voice-main.speaking .wave-container {
            display: flex;
        }
        
        .wave-bar {
            width: 4px;
            background: var(--accent-green);
            border-radius: 2px;
            animation: wave 0.4s ease-in-out infinite;
        }
        
        .voice-main.speaking .wave-bar {
            background: var(--accent-orange);
        }
        
        .wave-bar:nth-child(1) { height: 20px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 30px; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 40px; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 30px; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 20px; animation-delay: 0.4s; }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        
        /* Modern Audio Player */
        .audio-player {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .audio-player.active {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .audio-player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        
        .audio-player-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .audio-player-title::before {
            content: '🔊';
        }
        
        .audio-player-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            line-height: 1;
        }
        
        .audio-progress {
            position: relative;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            overflow: hidden;
        }
        
        .audio-progress-fill {
            height: 100%;
            background: var(--gradient-red);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .audio-play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-red);
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .audio-play-btn:hover {
            transform: scale(1.1);
        }
        
        .audio-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }
        
        .audio-info {
            flex: 1;
        }
        
        .audio-text {
            font-size: 0.85rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Chat Log */
        .chat-log {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .chat-log::-webkit-scrollbar {
            width: 4px;
        }
        
        .chat-log::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        
        .chat-log::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }
        
        .voice-message {
            padding: 1rem 1.25rem;
            border-radius: 1.25rem;
            max-width: 90%;
            animation: slideUp 0.3s ease;
        }
        
        .voice-message.user {
            background: var(--gradient-red);
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }
        
        .voice-message.ai {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
        }
        
        .voice-message .text {
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .voice-message .time {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-top: 0.5rem;
        }
        
        .voice-message .typing {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-orange);
            border-radius: 50%;
            animation: typingPulse 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        /* Quick Commands */
        .quick-voice {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        
        .voice-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .voice-btn:hover {
            border-color: var(--accent-red);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }
        
        /* Context indicator */
        .context-indicator {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: var(--bg-card);
            border-radius: 0.5rem;
            display: none;
        }
        
        .context-indicator.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>🐭</span> OpenPapa</h1>
            <p>您的語音美食助手</p>
        </header>
        
        <!-- Main Voice Button -->
        <div class="voice-main" id="voiceMain">
            <span class="papa-emoji">🐭</span>
            <div class="voice-status" id="voiceStatus">👆 點擊說話</div>
            <div class="voice-hint" id="voiceHint">告訴我您想吃什麼</div>
            <div class="recording-indicator" id="recordingIndicator">🎤 正在錄音...</div>
            <div class="wave-container">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
        </div>
        
        <!-- Context Indicator -->
        <div class="context-indicator" id="contextIndicator">
            💬 對話中 - 可以繼續提問
        </div>
        
        <!-- Audio Player -->
        <div class="audio-player" id="audioPlayer">
            <div class="audio-player-header">
                <div class="audio-player-title">OpenPapa 回覆</div>
                <button class="audio-player-close" onclick="closeAudioPlayer()">×</button>
            </div>
            <div class="audio-progress" onclick="seekAudio(event)">
                <div class="audio-progress-fill" id="audioProgressFill"></div>
            </div>
            <div class="audio-controls">
                <button class="audio-play-btn" id="audioPlayBtn" onclick="togglePlay()">▶</button>
                <div class="audio-info">
                    <div class="audio-text" id="audioText">...</div>
                    <div class="audio-time">
                        <span id="audioCurrentTime">0:00</span> / <span id="audioDuration">0:00</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Chat Log -->
        <div class="chat-log" id="chatLog"></div>
        
        <!-- Quick Commands -->
        <div class="quick-voice">
            <button class="voice-btn" onclick="quickCommand('我想吃辣的食物')">🌶️ 辣的</button>
            <button class="voice-btn" onclick="quickCommand('我想吃義大利料理')">🍝 義大利</button>
            <button class="voice-btn" onclick="quickCommand('給我一個驚喜')">🎲 驚喜</button>
            <button class="voice-btn" onclick="quickCommand('我需要咖啡')">☕ 咖啡</button>
        </div>
    </div>
    
    <script>
        const TTS_URL = 'https://portfolio-tts-test-production.up.railway.app/tts';
        
        let isSpeaking = false;
        let isListening = false;
        let isPlaying = false;
        let audioBlob = null;
        let recognition = null;
        let conversationContext = [];
        let audioElement = null;
        let currentAudioUrl = null;
        
        // Initialize Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'zh-TW';
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                addMessage(transcript, 'user');
                processCommand(transcript);
            };
            
            recognition.onend = () => {
                if (isListening) {
                    stopListening();
                }
            };
        }
        
        function handleVoiceClick() {
            if (isSpeaking) return;
            
            if (!isListening) {
                startListening();
            } else {
                stopListening();
            }
        }
        
        function startListening() {
            if (!recognition) {
                addMessage('抱歉，您的瀏覽器不支持語音辨識', 'ai');
                return;
            }
            
            isListening = true;
            const main = document.getElementById('voiceMain');
            const status = document.getElementById('voiceStatus');
            const hint = document.getElementById('voiceHint');
            
            main.classList.add('listening');
            main.classList.remove('speaking');
            status.textContent = "🎤 正在聽...";
            hint.textContent = "請說話";
            
            try {
                recognition.start();
            } catch (e) {
                stopListening();
            }
        }
        
        function stopListening() {
            isListening = false;
            const main = document.getElementById('voiceMain');
            const status = document.getElementById('voiceStatus');
            const hint = document.getElementById('voiceHint');
            
            main.classList.remove('listening');
            
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
            }
            
            if (!isSpeaking) {
                status.textContent = "👆 點擊說話";
                hint.textContent = "告訴我您想吃什麼";
            }
        }
        
        function quickCommand(text) {
            if (isSpeaking || isListening) return;
            addMessage(text, 'user');
            processCommand(text);
        }
        
        function addMessage(text, sender) {
            const chatLog = document.getElementById('chatLog');
            const msg = document.createElement('div');
            msg.className = `voice-message ${sender}`;
            
            const icon = sender === 'user' ? '🎤' : '🐭';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            msg.innerHTML = `
                <span class="text">${icon} ${text}</span>
                <div class="time">${time}</div>
            `;
            
            chatLog.appendChild(msg);
            chatLog.scrollTop = chatLog.scrollHeight;
            
            // Update context
            if (sender === 'user') {
                conversationContext.push({ role: 'user', text: text });
            }
        }
        
        function showTyping() {
            const chatLog = document.getElementById('chatLog');
            const msg = document.createElement('div');
            msg.className = 'voice-message ai';
            msg.id = 'typingMessage';
            msg.innerHTML = `
                <span class="text">
                    <span class="typing">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </span>
                </span>
            `;
            chatLog.appendChild(msg);
            chatLog.scrollTop = chatLog.scrollHeight;
        }
        
        function removeTyping() {
            const typingMsg = document.getElementById('typingMessage');
            if (typingMsg) typingMsg.remove();
        }
        
        function updateContextIndicator(show) {
            const indicator = document.getElementById('contextIndicator');
            if (show && conversationContext.length > 1) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }
        }
        
        function generateAIResponse(userText) {
            const lower = userText.toLowerCase();
            
            // Get conversation history for context
            const history = conversationContext;
            let lastTopic = null;
            
            // Find last mentioned topic
            for (let i = history.length - 1; i >= 0; i--) {
                const msg = history[i];
                if (msg.text.includes('辣') || msg.text.includes('火鍋')) { lastTopic = 'spicy'; break; }
                if (msg.text.includes('義大利') || msg.text.includes('意大利') || msg.text.includes('意大利')) { lastTopic = 'italian'; break; }
                if (msg.text.includes('咖啡') || msg.text.includes('coffee')) { lastTopic = 'coffee'; break; }
                if (msg.text.includes('日本') || msg.text.includes('壽司') || msg.text.includes('sushi')) { lastTopic = 'japanese'; break; }
                if (msg.text.includes('早餐') || msg.text.includes('早午餐') || msg.text.includes('brunch')) { lastTopic = 'brunch'; break; }
                if (msg.text.includes('米其林') || msg.text.includes('高級')) { lastTopic = 'michelin'; break; }
            }
            
            // Context-aware responses based on conversation history
            // 1. Follow-up questions
            const followUpWords = ['仲有', '其他', '仲想', '仲要', '仲有咩', '仲有其他', '仲有冇', '仲想問', '再問', '仲想知', '仲有沒有'];
            const isFollowUp = followUpWords.some(w => lower.includes(w));
            
            if (isFollowUp && lastTopic) {
                if (lastTopic === 'spicy') return "除咗麻辣火鍋，仲有泰式酸辣湯、四川涼皮、水煮魚都好正！要邊個？🌶️";
                if (lastTopic === 'italian') return "意粉之外，披薩、燉飯、千層面都好正！想試邊款？🍝";
                if (lastTopic === 'coffee') return "除咗手沖咖啡，仲有抹茶拿鐵、燕麥奶拿鐵、泰式奶茶添！☕";
                if (lastTopic === 'japanese') return "壽司之外，仲有拉麵、串燒、天婦羅！想食咩？🍣";
                if (lastTopic === 'brunch') return "除咗班尼迪蛋，仲有法式吐司、acai bowl、松餅！🥐";
                if (lastTopic === 'michelin') return "米其林之外，仲有黑珍珠、推薦餐廳！要睇其他選擇嗎？⭐";
            }
            
            // 2. Clarifying questions after recommendation
            if (lower.includes('邊間') || lower.includes('邊一家') || lower.includes('邊一個') || lower.includes('推薦邊')) {
                if (lastTopic === 'spicy') return "最hit既係「辣妹子火鍋」，评分4.8！📍";
                if (lastTopic === 'italian') return "我最推介「小意大利」，手工意粉正呀！📍";
                if (lastTopic === 'coffee') return "就係呢間「Coffee Lab」，手沖單品咖啡超正！📍";
                if (lastTopic === 'japanese') return "「壽司山大雄」既新鮮程度最高！📍";
            }
            
            // 3. Confirmation responses
            if (lower.includes('好') || lower.includes('可以') || lower.includes('要') || lower.includes('試') || lower.includes('去')) {
                if (lastTopic) {
                    return "好！我幫你book定位？定係想睇menu先？📋";
                }
            }
            
            // 4. Original topic logic (only if no context match)
            if (lower.includes('辣') || lower.includes('spicy')) {
                return "好！附近有一家超正既麻辣火鍋，辣得過癮！而且評價好高🇨🇳";
            } else if (lower.includes('義大利') || lower.includes('意大利') || lower.includes('italian')) {
                return "意大利菜？呢度有一家手工意粉既餐廳超讚慨🇮🇹";
            } else if (lower.includes('驚喜') || lower.includes('surprise') || lower.includes('random')) {
                return "好！今日既hidden gem係呢間「深夜食堂」🇯🇵";
            } else if (lower.includes('咖啡') || lower.includes('coffee') || lower.includes('提神')) {
                return "OK！呢度有幾家人氣咖啡店☕";
            } else if (lower.includes('日本') || lower.includes('壽司') || lower.includes('sushi')) {
                return "日本料理？呢間壽司店既食材超新鮮🇯🇵";
            } else if (lower.includes('早餐') || lower.includes('早午餐') || lower.includes('brunch')) {
                return "早午餐？呢間既班尼迪克蛋超級正🥐";
            } else if (lower.includes('貴') || lower.includes('高級') || lower.includes('michelin')) {
                return "米其林？呢度有3間星級餐廳好啱慶祝🥇";
            } else if (lower.includes('便') || lower.includes('平') || lower.includes('budget') || lower.includes('$$')) {
                return "平靚正？呢間既叉燒飯CP值超高🇭🇰";
            } else if (lower.includes('近') || lower.includes(' nearby') || lower.includes('附近')) {
                return "離你呢度最近既係呢間，行路5分鐘就到📍";
            } else if (lower.includes('想') || lower.includes('要') || lower.includes('搵') || lower.includes('搵')) {
                return "明白！等我幫你搵下🇨🇳";
            } else {
                return "好問題！我地有中式、日式、意大利菜、印度咖喱🍜";
            }
        }
        
        async function processCommand(text) {
            const main = document.getElementById('voiceMain');
            const status = document.getElementById('voiceStatus');
            const hint = document.getElementById('voiceHint');
            
            isListening = false;
            main.classList.remove('listening');
            main.classList.add('speaking');
            isSpeaking = true;
            
            status.textContent = "🧠 AI 思考中...";
            hint.textContent = "等佢砌一砌";
            
            showTyping();
            
            try {
                // Simulate thinking time for better UX
                await new Promise(r => setTimeout(r, 1000));
                
                const aiResponse = generateAIResponse(text);
                removeTyping();
                addMessage(aiResponse, 'ai');
                
                // Update context
                conversationContext.push({ role: 'assistant', text: aiResponse });
                updateContextIndicator(true);
                
                // Show audio player
                status.textContent = "🔊 緊係緊係...";
                
                const response = await fetch(TTS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: aiResponse,
                        model: 'speech-2.8-hd',
                        voice: 'Chinese (Mandarin)_Cute_Spirit',
                        speed: 1,
                        emotion: 'happy'
                    })
                });
                
                if (!response.ok) {
                    throw new Error('TTS failed');
                }
                
                audioBlob = await response.blob();
                const url = URL.createObjectURL(audioBlob);
                currentAudioUrl = url;
                
                // Show audio player
                showAudioPlayer(url, aiResponse);
                
            } catch (err) {
                removeTyping();
                addMessage('抱歉，出錯了: ' + err.message, 'ai');
                isSpeaking = false;
                main.classList.remove('speaking');
                status.textContent = "👆 點擊說話";
                hint.textContent = "告訴我您想吃什麼";
            }
        }
        
        function showAudioPlayer(url, text) {
            const player = document.getElementById('audioPlayer');
            const playerText = document.getElementById('audioText');
            const main = document.getElementById('voiceMain');
            const status = document.getElementById('voiceStatus');
            const hint = document.getElementById('voiceHint');
            
            playerText.textContent = text;
            player.classList.add('active');
            
            // Create audio element
            if (audioElement) {
                audioElement.pause();
                audioElement = null;
            }
            
            audioElement = new Audio(url);
            audioElement.onplay = () => {
                isPlaying = true;
                document.getElementById('audioPlayBtn').textContent = '⏸';
            };
            
            audioElement.onended = () => {
                isPlaying = false;
                document.getElementById('audioPlayBtn').textContent = '▶';
                document.getElementById('audioProgressFill').style.width = '100%';
                isSpeaking = false;
                main.classList.remove('speaking');
                status.textContent = "👆 點擊說話";
                hint.textContent = "可以繼續傾偈 🇭🇰";
            };
            
            audioElement.ontimeupdate = () => {
                const percent = (audioElement.currentTime / audioElement.duration) * 100;
                document.getElementById('audioProgressFill').style.width = percent + '%';
                document.getElementById('audioCurrentTime').textContent = formatTime(audioElement.currentTime);
                document.getElementById('audioDuration').textContent = formatTime(audioElement.duration);
            };
            
            audioElement.play();
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function togglePlay() {
            if (!audioElement) return;
            
            if (isPlaying) {
                audioElement.pause();
                document.getElementById('audioPlayBtn').textContent = '▶';
            } else {
                audioElement.play();
                document.getElementById('audioPlayBtn').textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }
        
        function seekAudio(event) {
            if (!audioElement) return;
            
            const progressBar = event.currentTarget;
            const percent = event.offsetX / progressBar.offsetWidth;
            audioElement.currentTime = percent * audioElement.duration;
        }
        
        function closeAudioPlayer() {
            const player = document.getElementById('audioPlayer');
            player.classList.remove('active');
            
            if (audioElement) {
                audioElement.pause();
            }
            
            const main = document.getElementById('voiceMain');
            if (!isSpeaking) {
                main.classList.remove('speaking');
                document.getElementById('voiceStatus').textContent = "👆 點擊說話";
                document.getElementById('voiceHint').textContent = "可以繼續傾偈 🇭🇰";
            }
        }
        
        // Initialize
        window.addEventListener('load', () => {
            if (!SpeechRecognition) {
                document.getElementById('voiceStatus').textContent = "⚠️ 不支援語音";
                document.getElementById('voiceHint').textContent = "用下方按鈕測試";
            } else {
                document.getElementById('voiceMain').onclick = handleVoiceClick;
            }
            
            // Welcome message
            setTimeout(() => {
                addMessage('你好！我是 OpenPapa！🐭 話比我知你想食咩？', 'ai');
            }, 500);
        });
    </script>
</body>
</html>
