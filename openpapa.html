<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPapa - 您的语音美食助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }
        
        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.8);
        }
        
        .avatar.speaking {
            animation: speaking 1s ease-in-out infinite;
        }
        
        .avatar.listening {
            animation: listening 0.5s ease-in-out infinite;
        }
        
        @keyframes speaking {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(102, 126, 234, 0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 60px rgba(102, 126, 234, 1); }
        }
        
        @keyframes listening {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* Sound wave animation */
        .sound-waves {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .avatar.speaking .sound-waves,
        .avatar.listening .sound-waves {
            opacity: 1;
        }
        
        .wave {
            width: 4px;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }
        
        .wave:nth-child(1) { height: 10px; animation-delay: 0s; }
        .wave:nth-child(2) { height: 20px; animation-delay: 0.1s; }
        .wave:nth-child(3) { height: 30px; animation-delay: 0.2s; }
        .wave:nth-child(4) { height: 20px; animation-delay: 0.3s; }
        .wave:nth-child(5) { height: 10px; animation-delay: 0.4s; }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        
        .status {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .status.active {
            color: #667eea;
        }
        
        /* Simple chat interface */
        .chat-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        
        .message.ai {
            background: rgba(255,255,255,0.1);
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        /* Audio player */
        .audio-player {
            display: none;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .audio-player.active { display: block; }
        
        .audio-progress {
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-bottom: 10px;
            cursor: pointer;
            overflow: hidden;
        }
        
        .audio-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.1s;
        }
        
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* Quick buttons */
        .quick-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .quick-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #888;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quick-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="avatar-container">
        <div class="avatar" id="avatar" onclick="handleVoiceClick">👨‍🍳</div>
        <div class="sound-waves">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>
    </div>
    
    <div class="status" id="status">点击说话</div>
    
    <div class="audio-player" id="audioPlayer">
        <div class="audio-progress" onclick="seekAudio(event)">
            <div class="audio-progress-fill" id="progressFill"></div>
        </div>
        <div class="audio-controls">
            <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
            <span id="audioTime">0:00 / 0:00</span>
        </div>
    </div>
    
    <div class="chat-container" id="chatContainer"></div>
    
    <div class="quick-btns">
        <button class="quick-btn" onclick="quickCommand('辣的食物')">🌶️ 辣</button>
        <button class="quick-btn" onclick="quickCommand('意大利菜')">🍝 意大利</button>
        <button class="quick-btn" onclick="quickCommand('咖啡')">☕ 咖啡</button>
        <button class="quick-btn" onclick="quickCommand('惊喜推荐')">🎲 惊喜</button>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const OPENAI_API_KEY = urlParams.get('key');
        const TTS_URL = 'https://portfolio-tts-test-production.up.railway.app/tts';
        
        let isSpeaking = false;
        let isListening = false;
        let isPlaying = false;
        let audioElement = null;
        let recognition = null;
        let conversationHistory = [];
        
        const SYSTEM_PROMPT = `你是 OpenPapa，一个亲切的中文美食助手。你的目标是：
1. 用简体中文回答
2. 帮用户找餐厅、推荐美食
3. 对话要自然、流畅
4. 记住之前的对话内容，可以做 follow-up
5. 每次回答要简短，不要太长（最多100字）
6. 如果用户问的不是关于食物，可以轻松地引导回去

开始对话吧！`;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'zh-CN';
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                addMessage(text, 'user');
                processCommand(text);
            };
            recognition.onend = () => { if (isListening) stopListening(); };
        }
        
        function handleVoiceClick() {
            if (isSpeaking) return;
            if (!isListening) startListening(); else stopListening();
        }
        
        function startListening() {
            if (!recognition) { addMessage('抱歉，您的浏览器不支持语音识别', 'ai'); return; }
            isListening = true;
            document.getElementById('avatar').className = 'avatar listening';
            document.getElementById('status').textContent = '🎤 正在听...';
            document.getElementById('status').className = 'status active';
            try { recognition.start(); } catch (e) { stopListening(); }
        }
        
        function stopListening() {
            isListening = false;
            document.getElementById('avatar').className = 'avatar';
            document.getElementById('status').textContent = '点击说话';
            document.getElementById('status').className = 'status';
            if (recognition) try { recognition.stop(); } catch (e) {}
        }
        
        function quickCommand(text) {
            if (isSpeaking || isListening) return;
            addMessage(text, 'user');
            processCommand(text);
        }
        
        function addMessage(text, sender) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.textContent = text;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }
        
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typing = document.createElement('div');
            typing.className = 'message ai typing';
            typing.id = 'typingMsg';
            typing.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }
        
        function removeTyping() {
            const typing = document.getElementById('typingMsg');
            if (typing) typing.remove();
        }
        
        async function processCommand(text) {
            const avatar = document.getElementById('avatar');
            const status = document.getElementById('status');
            
            stopListening();
            avatar.className = 'avatar speaking';
            status.textContent = '🧠 GPT-4 思考中...';
            status.className = 'status active';
            
            showTyping();
            
            try {
                const messages = [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...conversationHistory.map(h => ({ role: h.role, content: h.content })),
                    { role: 'user', content: text }
                ];
                
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_API_KEY}` },
                    body: JSON.stringify({ model: 'gpt-4o-mini', messages: messages, max_tokens: 200 })
                });
                
                if (!response.ok) throw new Error('API error');
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                removeTyping();
                addMessage(aiResponse, 'ai');
                
                conversationHistory.push({ role: 'user', content: text });
                conversationHistory.push({ role: 'assistant', content: aiResponse });
                if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);
                
                // Generate TTS
                status.textContent = '🔊 生成语音中...';
                
                const ttsResponse = await fetch(TTS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: aiResponse, model: 'speech-2.8-hd', voice: 'Chinese (Mandarin)_Cute_Spirit', speed: 1, emotion: 'happy' })
                });
                
                if (!ttsResponse.ok) throw new Error('TTS failed');
                
                const audioBlob = await ttsResponse.blob();
                const url = URL.createObjectURL(audioBlob);
                showAudioPlayer(url);
                
            } catch (err) {
                removeTyping();
                addMessage('抱歉，出错了: ' + err.message, 'ai');
                avatar.className = 'avatar';
                status.textContent = '点击说话';
                status.className = 'status';
                isSpeaking = false;
            }
        }
        
        function showAudioPlayer(url) {
            const player = document.getElementById('audioPlayer');
            player.classList.add('active');
            
            if (audioElement) { audioElement.pause(); audioElement = null; }
            
            audioElement = new Audio(url);
            audioElement.onplay = () => { isPlaying = true; document.getElementById('playBtn').textContent = '⏸'; };
            audioElement.onended = () => {
                isPlaying = false;
                isSpeaking = false;
                document.getElementById('playBtn').textContent = '▶';
                document.getElementById('avatar').className = 'avatar';
                document.getElementById('status').textContent = '点击说话';
                document.getElementById('status').className = 'status';
                document.getElementById('progressFill').style.width = '100%';
            };
            audioElement.ontimeupdate = () => {
                const p = (audioElement.currentTime / audioElement.duration) * 100;
                document.getElementById('progressFill').style.width = p + '%';
                document.getElementById('audioTime').textContent = formatTime(audioElement.currentTime) + ' / ' + formatTime(audioElement.duration);
            };
            
            audioElement.play();
        }
        
        function formatTime(s) {
            return Math.floor(s/60) + ':' + Math.floor(s%60).toString().padStart(2,'0');
        }
        
        function togglePlay() {
            if (!audioElement) return;
            if (isPlaying) { audioElement.pause(); document.getElementById('playBtn').textContent = '▶'; }
            else { audioElement.play(); document.getElementById('playBtn').textContent = '⏸'; }
            isPlaying = !isPlaying;
        }
        
        function seekAudio(e) {
            if (!audioElement) return;
            audioElement.currentTime = (e.offsetX / e.target.offsetWidth) * audioElement.duration;
        }
        
        // Welcome message
        setTimeout(() => {
            addMessage('你好！我是 OpenPapa 👨‍🍳 用GPT-4帮你找美食！告诉我你想吃什么？', 'ai');
        }, 500);
    </script>
</body>
</html>
