<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRice - Your Voice Food Companion</title>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --accent-red: #ff4444;
            --accent-orange: #ff6b35;
            --accent-yellow: #ffc107;
            --accent-green: #10b981;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --border-color: #2a2a3a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(255, 68, 68, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 107, 53, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 1rem 0 1.5rem;
        }
        
        header h1 {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        header h1 span {
            font-size: 2.5rem;
        }
        
        header p {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        
        /* Voice Panel - Main Interaction */
        .voice-main {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 2rem;
            padding: 2.5rem 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .voice-main:hover {
            border-color: var(--accent-red);
        }
        
        .voice-main.listening {
            border-color: var(--accent-red);
            box-shadow: 0 0 40px rgba(255, 68, 68, 0.3);
        }
        
        .voice-main.speaking {
            border-color: var(--accent-orange);
            box-shadow: 0 0 40px rgba(255, 107, 53, 0.3);
        }
        
        /* Animated Rice Bowl */
        .rice-bowl {
            width: 100px;
            height: 100px;
            margin: 0 auto 1rem;
            position: relative;
            transition: transform 0.3s;
        }
        
        .rice-bowl-icon {
            font-size: 4rem;
            display: block;
            transition: transform 0.3s;
        }
        
        .voice-main.listening .rice-bowl-icon {
            animation: bounce 0.6s infinite;
        }
        
        .voice-main.speaking .rice-bowl-icon {
            animation: speak 0.8s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes speak {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .voice-status {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-red);
            margin-bottom: 0.5rem;
        }
        
        .voice-hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        /* Location Badge */
        .location-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        
        .location-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Chat - Voice Transcripts */
        .chat-log {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        
        .voice-message {
            padding: 1rem 1.25rem;
            border-radius: 1.25rem;
            max-width: 90%;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .voice-message.user {
            background: linear-gradient(135deg, var(--accent-red), var(--accent-orange));
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }
        
        .voice-message.ai {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
        }
        
        .voice-message .icon {
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }
        
        .voice-message .text {
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .voice-message .time {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-top: 0.5rem;
        }
        
        /* Restaurant Cards */
        .restaurant-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 0.75rem;
            animation: slideUp 0.3s ease;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .restaurant-card:hover {
            border-color: var(--accent-red);
            transform: translateX(4px);
        }
        
        .restaurant-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .restaurant-name {
            font-weight: 700;
            font-size: 1rem;
        }
        
        .restaurant-rating {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-weight: 600;
        }
        
        .restaurant-rating .star {
            color: var(--accent-yellow);
        }
        
        .restaurant-info {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .restaurant-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .tag {
            background: rgba(255, 68, 68, 0.15);
            color: var(--accent-red);
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
        }
        
        .tag.michelin {
            background: rgba(255, 193, 7, 0.15);
            color: var(--accent-yellow);
        }
        
        /* Voice Wave Animation */
        .wave-container {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 40px;
            margin-top: 1rem;
        }
        
        .voice-main.listening .wave-container,
        .voice-main.speaking .wave-container {
            display: flex;
        }
        
        .wave-bar {
            width: 4px;
            background: var(--accent-red);
            border-radius: 2px;
            animation: wave 0.5s ease-in-out infinite;
        }
        
        .voice-main.listening .wave-bar {
            animation: wave 0.4s ease-in-out infinite;
        }
        
        .voice-main.speaking .wave-bar {
            animation: wave 0.6s ease-in-out infinite;
            background: var(--accent-orange);
        }
        
        .wave-bar:nth-child(1) { height: 20px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 30px; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 40px; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 30px; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 20px; animation-delay: 0.4s; }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        
        /* Quick Voice Commands */
        .quick-voice {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-top: auto;
        }
        
        .voice-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .voice-btn:hover {
            border-color: var(--accent-red);
            background: rgba(255, 68, 68, 0.1);
        }
        
        /* Footer Stats */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 1rem;
            margin-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-red);
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>🍚</span> OpenRice</h1>
            <p>Your Voice Food Companion</p>
        </header>
        
        <!-- Main Voice Button -->
        <div class="voice-main" id="voiceMain" onclick="handleVoiceClick()">
            <div class="rice-bowl">
                <span class="rice-bowl-icon">🍚</span>
            </div>
            <div class="voice-status" id="voiceStatus">Tap & Speak</div>
            <div class="voice-hint" id="voiceHint">Tell me what you want to eat</div>
            <div class="wave-container">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
        </div>
        
        <!-- Location -->
        <div class="location-badge">
            <span class="dot"></span>
            <span>San Francisco, CA</span>
        </div>
        
        <!-- Voice Chat Log -->
        <div class="chat-log" id="chatLog">
            <!-- Messages will appear here -->
        </div>
        
        <!-- Quick Voice Commands -->
        <div class="quick-voice">
            <button class="voice-btn" onclick="quickVoice('Find spicy food')">
                🌶️ Spicy
            </button>
            <button class="voice-btn" onclick="quickVoice('I want Italian')">
                🍝 Italian
            </button>
            <button class="voice-btn" onclick="quickVoice('Surprise me')">
                🎲 Surprise me
            </button>
            <button class="voice-btn" onclick="quickVoice('Need coffee')">
                ☕ Coffee
            </button>
        </div>
        
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value">42</div>
                <div class="stat-label">Nearby</div>
            </div>
            <div class="stat">
                <div class="stat-value">3</div>
                <div class="stat-label">Michelin</div>
            </div>
            <div class="stat">
                <div class="stat-value">4.3★</div>
                <div class="stat-label">Avg</div>
            </div>
        </div>
    </div>
    
    <script>
        // Restaurant Data
        const restaurants = [
            { name: "Tartine Bakery", rating: 4.7, cuisine: "Bakery", price: "$$", distance: "0.3 mi", tags: ["Bakery", "Coffee"], michelin: true },
            { name: "Swan Oyster Depot", rating: 4.8, cuisine: "Seafood", price: "$$$", distance: "0.5 mi", tags: ["Oysters", "Fresh"], michelin: true },
            { name: "House of Prime Rib", rating: 4.6, cuisine: "Steakhouse", price: "$$$", distance: "0.8 mi", tags: ["Prime Rib", "Classic"], michelin: true },
            { name: "Dragon Horse Bakery", rating: 4.5, cuisine: "Asian", price: "$", distance: "0.4 mi", tags: ["Asian", "Unique"], michelin: false }
        ];
        
        let isListening = false;
        let isProcessing = false;
        let utterance = null;
        
        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                handleUserVoice(transcript);
            };
            
            recognition.onerror = (event) => {
                console.log('Speech error:', event.error);
                stopListening();
            };
            
            recognition.onend = () => {
                if (isListening) {
                    stopListening();
                }
            };
        }
        
        function handleVoiceClick() {
            if (isProcessing) return;
            
            if (!isListening) {
                startListening();
            } else {
                stopListening();
            }
        }
        
        function startListening() {
            if (!recognition) {
                addVoiceMessage("Sorry, voice recognition is not supported in this browser. Try Chrome!", 'ai');
                return;
            }
            
            isListening = true;
            const main = document.getElementById('voiceMain');
            const status = document.getElementById('voiceStatus');
            const hint = document.getElementById('voiceHint');
            
            main.classList.add('listening');
            main.classList.remove('speaking');
            status.textContent = "Listening...";
            hint.textContent = "Speak now";
            
            try {
                recognition.start();
            } catch (e) {
                console.log('Recognition start error:', e);
            }
        }
        
        function stopListening() {
            isListening = false;
            const main = document.getElementById('voiceMain');
            const status = document.getElementById('voiceStatus');
            const hint = document.getElementById('voiceHint');
            
            main.classList.remove('listening');
            status.textContent = "Processing...";
            hint.textContent = "Thinking...";
            
            if (recognition) {
                try {
                    recognition.stop();
                } catch (e) {}
            }
        }
        
        function handleUserVoice(text) {
            addVoiceMessage(text, 'user');
            processVoiceCommand(text);
        }
        
        function quickVoice(text) {
            if (isProcessing) return;
            addVoiceMessage(text, 'user');
            processVoiceCommand(text);
        }
        
        function addVoiceMessage(text, sender) {
            const chatLog = document.getElementById('chatLog');
            const msg = document.createElement('div');
            msg.className = `voice-message ${sender}`;
            
            const icon = sender === 'user' ? '🎤' : '🍚';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            msg.innerHTML = `
                <span class="icon">${icon}</span>
                <span class="text">${text}</span>
                <div class="time">${time}</div>
            `;
            
            chatLog.appendChild(msg);
            chatLog.scrollTop = chatLog.scrollHeight;
        }
        
        function processVoiceCommand(text) {
            isProcessing = true;
            const main = document.getElementById('voiceMain');
            const status = document.getElementById('voiceStatus');
            const hint = document.getElementById('voiceHint');
            
            main.classList.remove('listening');
            main.classList.add('speaking');
            status.textContent = "Speaking...";
            
            // Simulate AI thinking
            setTimeout(() => {
                const response = generateResponse(text);
                speakResponse(response);
            }, 800);
        }
        
        function generateResponse(text) {
            const lower = text.toLowerCase();
            
            if (lower.includes('spicy') || lower.includes('🌶️')) {
                return "Looking for spicy options! Found some great Sichuan and Thai places nearby. Let me show you!";
            } else if (lower.includes('italian') || lower.includes('🍝')) {
                return "Found 3 excellent Italian restaurants. The pasta at Italian Homemade Company is amazing!";
            } else if (lower.includes('surprise') || lower.includes('🎲')) {
                return "Let me surprise you! Based on trending reviews, Swan Oyster Depot is the place to go right now.";
            } else if (lower.includes('coffee') || lower.includes('☕')) {
                return "Need caffeine! Tartine Bakery has the best coffee in the neighborhood. Only 3 minutes away.";
            } else if (lower.includes('sushi') || lower.includes('japanese')) {
                return "Great choice! Found excellent sushi spots. Let me recommend the freshest ones.";
            } else if (lower.includes('cheap') || lower.includes('budget') || lower.includes('$')) {
                return "Looking for affordable options! There are some great budget-friendly spots around.";
            } else if (lower.includes('michelin') || lower.includes('fancy') || lower.includes('special')) {
                return "Found 3 Michelin-recommended places! They're perfect for a special occasion.";
            } else {
                return "Great choice! Let me find the best options for you right now.";
            }
        }
        
        function speakResponse(text) {
            // Add AI response to chat
            addVoiceMessage(text, 'ai');
            
            // Speak the response
            if ('speechSynthesis' in window) {
                utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1;
                
                // Try to find a good voice
                const voices = speechSynthesis.getVoices();
                const englishVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) 
                    || voices.find(v => v.lang.startsWith('en'));
                
                if (englishVoice) {
                    utterance.voice = englishVoice;
                }
                
                utterance.onend = () => {
                    isProcessing = false;
                    const main = document.getElementById('voiceMain');
                    const status = document.getElementById('voiceStatus');
                    const hint = document.getElementById('voiceHint');
                    
                    main.classList.remove('speaking');
                    status.textContent = "Tap & Speak";
                    hint.textContent = "Tell me what you want";
                    
                    // Show restaurants after speaking
                    showRestaurants();
                };
                
                speechSynthesis.speak(utterance);
            } else {
                // No speech synthesis, just show restaurants
                isProcessing = false;
                const main = document.getElementById('voiceMain');
                const status = document.getElementById('voiceStatus');
                const hint = document.getElementById('voiceHint');
                
                main.classList.remove('speaking');
                status.textContent = "Tap & Speak";
                hint.textContent = "Tell me what you want";
                
                showRestaurants();
            }
        }
        
        function showRestaurants() {
            const chatLog = document.getElementById('chatLog');
            
            restaurants.forEach((r, i) => {
                setTimeout(() => {
                    const card = document.createElement('div');
                    card.className = 'restaurant-card';
                    card.innerHTML = `
                        <div class="restaurant-card-header">
                            <span class="restaurant-name">${r.name}</span>
                            <span class="restaurant-rating"><span class="star">★</span> ${r.rating}</span>
                        </div>
                        <div class="restaurant-info">
                            <span>${r.cuisine}</span>
                            <span>${r.price}</span>
                            <span>📍 ${r.distance}</span>
                        </div>
                        <div class="restaurant-tags">
                            ${r.tags.map(t => `<span class="tag ${r.michelin && t === 'Bakery' ? 'michelin' : ''}">${t}</span>`).join('')}
                        </div>
                    `;
                    chatLog.appendChild(card);
                    chatLog.scrollTop = chatLog.scrollHeight;
                }, i * 500);
            });
        }
        
        // Load voices
        if ('speechSynthesis' in window) {
            speechSynthesis.onvoiceschanged = () => {
                console.log('Voices loaded:', speechSynthesis.getVoices().length);
            };
        }
    </script>
</body>
</html>
