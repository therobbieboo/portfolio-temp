<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRice - Your Voice AI Food Companion</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --accent-orange: #ff6b35;
            --accent-yellow: #ffc107;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --border-color: #2a2a3a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 193, 7, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 1rem 0 1.5rem;
        }
        
        header h1 {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        header h1 span {
            font-size: 2.5rem;
        }
        
        header p {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        
        /* Voice Indicator - Full Screen */
        .voice-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 3rem 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .voice-panel:hover {
            border-color: var(--accent-orange);
        }
        
        .voice-panel.listening {
            border-color: var(--accent-orange);
            box-shadow: 0 0 40px rgba(255, 107, 53, 0.3);
        }
        
        .voice-panel.speaking {
            border-color: var(--accent-green);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
        }
        
        .voice-visualizer {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem;
            position: relative;
        }
        
        .voice-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-yellow));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }
        
        .voice-panel.listening .voice-circle {
            animation: pulse 1s infinite;
        }
        
        .voice-panel.speaking .voice-circle {
            animation: speak 0.8s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes speak {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .voice-waves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            pointer-events: none;
        }
        
        .wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent-orange);
            opacity: 0;
        }
        
        .voice-panel.listening .wave {
            animation: wave 2s infinite;
        }
        
        .wave:nth-child(2) { animation-delay: 0.5s; }
        .wave:nth-child(3) { animation-delay: 1s; }
        
        @keyframes wave {
            0% { width: 100%; height: 100%; opacity: 0.8; }
            100% { width: 180%; height: 180%; opacity: 0; }
        }
        
        .voice-status {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-orange);
            margin-bottom: 0.5rem;
        }
        
        .voice-subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .hint-text {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-top: 1rem;
        }
        
        /* Location Bar */
        .location-bar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .location-icon {
            font-size: 1.25rem;
        }
        
        .location-info {
            flex: 1;
        }
        
        .location-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .location-address {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .gps-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Chat Messages - Voice Only Display */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
            max-height: 350px;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        .message {
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            max-width: 90%;
            animation: slideIn 0.3s ease;
            position: relative;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.ai {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
        }
        
        .message.user {
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-yellow));
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }
        
        .message-text {
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .message-time {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 0.25rem;
        }
        
        .speaker-icon {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            font-size: 0.8rem;
        }
        
        /* Restaurant Cards */
        .restaurant-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .restaurant-card:hover {
            border-color: var(--accent-orange);
            transform: translateX(4px);
        }
        
        .restaurant-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }
        
        .restaurant-name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .restaurant-rating {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .restaurant-rating .stars {
            color: var(--accent-yellow);
        }
        
        .restaurant-meta {
            display: flex;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .restaurant-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .tag {
            background: rgba(255, 107, 53, 0.2);
            color: var(--accent-orange);
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
        }
        
        .tag.michelin {
            background: rgba(255, 193, 7, 0.2);
            color: var(--accent-yellow);
        }
        
        /* Sources */
        .sources {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .source-badge {
            font-size: 0.6rem;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }
        
        /* Stats */
        .stats-row {
            display: flex;
            gap: 0.75rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        
        .stat-item {
            flex: 1;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-orange);
        }
        
        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }
        
        /* Quick Voice Commands */
        .quick-commands {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .command-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 0.75rem;
            color: var(--text-primary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .command-btn:hover {
            border-color: var(--accent-orange);
            background: rgba(255, 107, 53, 0.1);
        }
        
        /* Voice waveform canvas */
        #waveform {
            width: 100%;
            height: 60px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>🍚</span> OpenRice</h1>
            <p>Voice-Only AI Food Companion</p>
        </header>
        
        <div class="location-bar">
            <div class="location-icon">📍</div>
            <div class="location-info">
                <div class="location-name">San Francisco, CA</div>
                <div class="location-address">GPS Active</div>
            </div>
            <div class="gps-indicator"></div>
        </div>
        
        <div class="voice-panel" id="voicePanel">
            <div class="voice-waves">
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
            <div class="voice-visualizer">
                <div class="voice-circle" id="voiceIcon">🎤</div>
            </div>
            <div class="voice-status" id="voiceStatus">Tap to speak</div>
            <div class="voice-subtitle" id="voiceSubtitle">I'll listen to your request</div>
            <canvas id="waveform"></canvas>
            <div class="hint-text">Tap the mic and speak naturally</div>
        </div>
        
        <div class="quick-commands">
            <button class="command-btn" onclick="voiceCommand('Find something spicy')">
                🌶️ Spicy
            </button>
            <button class="command-btn" onclick="voiceCommand('Find Italian food')">
                🍝 Italian
            </button>
            <button class="command-btn" onclick="voiceCommand('Surprise me')">
                🎲 Surprise me
            </button>
            <button class="command-btn" onclick="voiceCommand('Find coffee nearby')">
                ☕ Coffee
            </button>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <!-- Voice messages will appear here -->
        </div>
        
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value">47</div>
                <div class="stat-label">Nearby</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">3</div>
                <div class="stat-label">Michelin</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">4.2★</div>
                <div class="stat-label">Avg Rating</div>
            </div>
        </div>
    </div>
    
    <script>
        const restaurants = [
            {
                name: "Tartine Bakery",
                rating: 4.7,
                reviews: 2847,
                cuisine: "Bakery • American",
                price: "$$",
                distance: "0.3 mi",
                tags: ["Bakery", "Coffee", "Pastries"],
                michelin: true,
                sources: ["yelp", "google"]
            },
            {
                name: "House of Prime Rib",
                rating: 4.6,
                reviews: 5234,
                cuisine: "American • Steakhouse",
                price: "$$$",
                distance: "0.8 mi",
                tags: ["Prime Rib", "Classic"],
                michelin: true,
                sources: ["michelin", "yelp", "google"]
            },
            {
                name: "Swan Oyster Depot",
                rating: 4.8,
                reviews: 1892,
                cuisine: "Seafood • Oysters",
                price: "$$$",
                distance: "0.5 mi",
                tags: ["Seafood", "Oysters", "Fresh"],
                michelin: true,
                sources: ["michelin", "google"]
            }
        ];
        
        let isListening = false;
        let isSpeaking = false;
        
        // Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        
        function speak(text) {
            if (!synth) return;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.volume = 1;
            
            // Choose a good voice
            const voices = synth.getVoices();
            const englishVoice = voices.find(v => v.lang.includes('en') && v.name.includes('Google')) 
                || voices.find(v => v.lang.includes('en'));
            if (englishVoice) utterance.voice = englishVoice;
            
            utterance.onstart = () => {
                isSpeaking = true;
                updateVoicePanel('speaking', '🔊 Speaking...', 'Listen to my recommendation');
            };
            
            utterance.onend = () => {
                isSpeaking = false;
                if (!isListening) {
                    updateVoicePanel('idle', 'Tap to speak', 'Try saying "Find Italian food"');
                }
            };
            
            synth.speak(utterance);
        }
        
        function updateVoicePanel(state, status, subtitle) {
            const panel = document.getElementById('voicePanel');
            const statusEl = document.getElementById('voiceStatus');
            const subtitleEl = document.getElementById('voiceSubtitle');
            const iconEl = document.getElementById('voiceIcon');
            
            panel.classList.remove('listening', 'speaking');
            if (state === 'listening') panel.classList.add('listening');
            if (state === 'speaking') panel.classList.add('speaking');
            
            statusEl.textContent = status;
            subtitleEl.textContent = subtitle;
            iconEl.textContent = state === 'listening' ? '👂' : state === 'speaking' ? '🔊' : '🎤';
        }
        
        // Initialize speech recognition
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            recognition.onstart = () => {
                isListening = true;
                updateVoicePanel('listening', 'Listening...', 'Speak now');
                drawWaveform();
            };
            
            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(r => r[0].transcript)
                    .join('');
                
                if (event.results[0].isFinal) {
                    processVoiceInput(transcript);
                }
            };
            
            recognition.onend = () => {
                isListening = false;
                if (!isSpeaking) {
                    updateVoicePanel('idle', 'Tap to speak', 'Try saying "Find Italian food"');
                }
            };
            
            recognition.onerror = (e) => {
                console.log('Speech error:', e);
                isListening = false;
                updateVoicePanel('idle', 'Tap to speak', 'Try again');
            };
        }
        
        // Draw animated waveform
        function drawWaveform() {
            const canvas = document.getElementById('waveform');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            let frame = 0;
            const bars = 30;
            
            function animate() {
                if (!isListening) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    return;
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = canvas.width / bars;
                const gap = 4;
                
                for (let i = 0; i < bars; i++) {
                    const height = Math.random() * (canvas.height * 0.8) + canvas.height * 0.1;
                    const x = i * barWidth + gap / 2;
                    const y = (canvas.height - height) / 2;
                    
                    const gradient = ctx.createLinearGradient(0, y, 0, y + height);
                    gradient.addColorStop(0, '#ff6b35');
                    gradient.addColorStop(1, '#ffc107');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x, y, barWidth - gap, height);
                }
                
                frame++;
                if (isListening) requestAnimationFrame(animate);
            }
            
            animate();
        }
        
        function toggleVoice() {
            if (isSpeaking) {
                synth.cancel();
                isSpeaking = false;
                return;
            }
            
            if (isListening) {
                if (recognition) recognition.stop();
                return;
            }
            
            if (recognition) {
                try {
                    recognition.start();
                } catch (e) {
                    console.log('Recognition start error:', e);
                }
            } else {
                // Fallback: simulate voice input
                simulateVoiceInput();
            }
        }
        
        function simulateVoiceInput() {
            updateVoicePanel('listening', 'Listening...', 'Speak now');
            
            setTimeout(() => {
                const responses = [
                    "Find something spicy",
                    "Find Italian food",
                    "Surprise me"
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                processVoiceInput(randomResponse);
            }, 2500);
        }
        
        function voiceCommand(cmd) {
            processVoiceInput(cmd);
        }
        
        function processVoiceInput(text) {
            if (!text) return;
            
            addVoiceMessage(text, 'user');
            updateVoicePanel('speaking', 'Processing...', 'Understanding your request');
            
            const lower = text.toLowerCase();
            let response = "";
            let recommendation = "";
            
            setTimeout(() => {
                if (lower.includes('spicy') || lower.includes('🌶️')) {
                    response = "Looking for spicy options around you!";
                    recommendation = "Found 3 great spicy restaurants!";
                } else if (lower.includes('italian') || lower.includes('🍝')) {
                    response = "Searching for Italian restaurants nearby!";
                    recommendation = "Here are the best Italian spots:";
                } else if (lower.includes('surprise') || lower.includes('🎲')) {
                    response = "Let me surprise you with something amazing!";
                    recommendation = "This place is trending right now:";
                } else if (lower.includes('coffee') || lower.includes('☕')) {
                    response = "Finding the best coffee spots!";
                    recommendation = "Top rated coffee nearby:";
                } else {
                    response = "Looking for great food options for you!";
                    recommendation = "Here are some recommendations:";
                }
                
                addVoiceMessage(response + " " + recommendation, 'ai');
                speak(response + " " + recommendation);
                
                setTimeout(() => {
                    showRestaurants();
                }, 1500);
            }, 800);
        }
        
        function addVoiceMessage(text, sender) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            
            const icon = sender === 'user' ? '🎙️' : '🔊';
            
            msg.innerHTML = `
                <div class="message-text">${text}</div>
                <div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }
        
        function showRestaurants() {
            const container = document.getElementById('chatContainer');
            let count = 0;
            
            restaurants.forEach((r, i) => {
                setTimeout(() => {
                    const card = document.createElement('div');
                    card.className = 'message ai';
                    card.innerHTML = `
                        <div class="restaurant-card">
                            <div class="restaurant-header">
                                <div class="restaurant-name">${r.name}</div>
                                <div class="restaurant-rating">
                                    <span class="stars">★</span> ${r.rating}
                                </div>
                            </div>
                            <div class="restaurant-meta">
                                <span>${r.cuisine}</span>
                                <span>${r.price}</span>
                                <span>📍 ${r.distance}</span>
                            </div>
                            <div class="restaurant-tags">
                                ${r.tags.map(t => `<span class="tag ${r.michelin && t === 'Bakery' ? 'michelin' : ''}">${t}</span>`).join('')}
                            </div>
                            <div class="sources">
                                ${r.sources.map(s => `<span class="source-badge ${s}">${s.charAt(0).toUpperCase() + s.slice(1)}</span>`).join('')}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                    container.scrollTop = container.scrollHeight;
                    
                    // Speak each restaurant
                    speak(`${r.name}, rated ${r.rating} stars, ${r.distance} away.`);
                    
                    count++;
                    if (count === restaurants.length) {
                        speak("Would you like directions to any of these?");
                    }
                }, i * 2500);
            });
        }
        
        // Initialize
        document.getElementById('voicePanel').addEventListener('click', toggleVoice);
        
        // Load voices
        if (synth) {
            synth.getVoices();
            synth.addEventListener('voiceschanged', () => synth.getVoices());
        }
        
        // Initial greeting
        setTimeout(() => {
            const greeting = "Hello! I'm OpenRice, your voice food companion. Just tell me what you're in the mood for, and I'll find the best restaurants nearby.";
            addVoiceMessage(greeting, 'ai');
            speak(greeting);
        }, 500);
    </script>
</body>
